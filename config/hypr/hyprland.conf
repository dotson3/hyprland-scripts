# Minimal Hyprland config — omarchy spirit, no bloat.
# Launch apps: alacritty (terminal), fuzzel (launcher).
# No display manager; start from TTY with `Hyprland`.

$mainMod = SUPER

# Look & feel (keep it plain)
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
general {
  gaps_in = 4
  gaps_out = 8
  border_size = 2
  col.active_border = 0x3fb950
  col.inactive_border = 0x30363d
  layout = dwindle
}

# Autostart (the bar + notifications)
exec-once = waybar
exec-once = mako

# Monitors (auto)
monitor = ,preferred,auto,1

# Keybinds
bind = $mainMod, RETURN, exec, alacritty
bind = $mainMod, E, exec, fuzzel
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen,
bind = $mainMod, M, exit,
bind = $mainMod, LEFT, workspace, previous
bind = $mainMod, RIGHT, workspace, next
bind = $mainMod SHIFT, LEFT, movetoworkspace, previous
bind = $mainMod SHIFT, RIGHT, movetoworkspace, next

# Workspaces 1-9
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Screenshot (uses hypr_shot.py from this repo, or raw grim)
bind = $mainMod, PRINT, exec, grim -g "$(slurp)" ~/Pictures/Screenshot-$(date +%Y%m%d-%H%M%S).png

# Window rules (sane defaults)
windowrule = float, ^(fuzzel)$
windowrule = float, ^(pavucontrol)$

# Misc
misc {
  force_default_wallpaper = 0
}
